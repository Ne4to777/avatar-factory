name: Docker Build Test

on:
  push:
    branches: [ main ]
    paths:
      - 'gpu-worker/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'gpu-worker/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      working-directory: ./gpu-worker
      run: |
        docker build -t avatar-gpu-worker:test .
        
    - name: Test image exists
      run: |
        docker images | grep avatar-gpu-worker
