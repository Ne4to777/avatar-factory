# Avatar Factory - Full Stack Docker Compose
# Включает все компоненты: App, Worker, GPU Server, Infrastructure

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: avatar-factory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-avatar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-avatar_password}
      POSTGRES_DB: ${POSTGRES_DB:-avatar_factory}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - avatar-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: avatar-factory-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - avatar-network

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: avatar-factory-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - avatar-network

  # MinIO Setup (создает bucket)
  minio-setup:
    image: minio/mc:latest
    container_name: avatar-factory-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb myminio/avatar-videos --ignore-existing;
      /usr/bin/mc anonymous set download myminio/avatar-videos;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    networks:
      - avatar-network

  # GPU Worker (требует nvidia-docker)
  gpu-worker:
    build:
      context: ./gpu-worker
      dockerfile: Dockerfile
    container_name: avatar-factory-gpu-worker
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - GPU_API_KEY=${GPU_API_KEY:-your-secret-key}
      - HOST=0.0.0.0
      - PORT=8001
      - CUDA_VISIBLE_DEVICES=0
    ports:
      - "${GPU_PORT:-8001}:8001"
    volumes:
      - ./gpu-worker/checkpoints:/app/checkpoints
      - ./gpu-worker/models:/app/models
      - gpu_temp:/tmp/avatar-factory
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 5m
    networks:
      - avatar-network

  # Main Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avatar-factory-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-avatar}:${POSTGRES_PASSWORD:-avatar_password}@postgres:5432/${POSTGRES_DB:-avatar_factory}
      - REDIS_URL=redis://redis:6379
      - GPU_SERVER_URL=http://gpu-worker:8001
      - GPU_API_KEY=${GPU_API_KEY:-your-secret-key}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - avatar-network

  # Video Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avatar-factory-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      gpu-worker:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-avatar}:${POSTGRES_PASSWORD:-avatar_password}@postgres:5432/${POSTGRES_DB:-avatar_factory}
      - REDIS_URL=redis://redis:6379
      - GPU_SERVER_URL=http://gpu-worker:8001
      - GPU_API_KEY=${GPU_API_KEY:-your-secret-key}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin123}
    command: ["node", "workers/video-worker.js"]
    networks:
      - avatar-network

  # Nginx (reverse proxy - опционально)
  nginx:
    image: nginx:alpine
    container_name: avatar-factory-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - avatar-network
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  minio_data:
  gpu_temp:

networks:
  avatar-network:
    driver: bridge

# Использование:
#
# Full stack (development):
#   docker-compose -f docker-compose.full.yml up -d
#
# Full stack (production with nginx):
#   docker-compose -f docker-compose.full.yml --profile production up -d
#
# Only infrastructure:
#   docker-compose up -d
#
# GPU Worker separately:
#   cd gpu-worker && docker-compose up -d
#
# Logs:
#   docker-compose -f docker-compose.full.yml logs -f
#
# Stop:
#   docker-compose -f docker-compose.full.yml down
#
# Deep clean:
#   docker-compose -f docker-compose.full.yml down -v
