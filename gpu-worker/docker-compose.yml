# GPU Worker Docker Compose
# Для запуска GPU сервера в Docker

services:
  gpu-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avatar-factory-gpu-worker
    restart: unless-stopped
    
    # GPU access
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
    # Environment
    environment:
      - GPU_API_KEY=${GPU_API_KEY:-your-secret-key}
      - HOST=0.0.0.0
      - PORT=8001
      - CUDA_VISIBLE_DEVICES=0
    
    # Ports
    ports:
      - "8001:8001"
    
    # Volumes
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./models:/app/models
      - gpu_temp:/tmp/avatar-factory
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5m
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  gpu_temp:

# Для запуска:
# docker-compose up -d
#
# Для остановки:
# docker-compose down
#
# Для логов:
# docker-compose logs -f
